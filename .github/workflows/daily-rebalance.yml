name: Daily Portfolio Rebalance

on:
  # Runs at 10:00 AM ET (14:00 UTC) on weekdays.
  schedule:
    - cron: "0 14 * * 1-5"

  # Allows you to trigger a run manually from the GitHub Actions tab.
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "Skip EMS, deploy dashboard only"
        required: false
        default: "false"
      force_rebalance:
        description: "Bypass drift gate and rebalance all positions to target weights (use after editing targets.json)"
        required: false
        default: "false"

jobs:
  rebalance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.event.inputs.deploy_only != 'true' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Check out the repository (includes ems.py and targets.json)
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the EMS script.
      #    PUBLIC_SECRET_KEY is pulled from GitHub Secrets — never stored in code.
      - name: Run EMS
        env:
          PUBLIC_SECRET_KEY: ${{ secrets.PUBLIC_SECRET_KEY }}
          # Set this GitHub Actions variable to "false" to enable live trading.
          # Go to: Settings → Secrets and variables → Actions → Variables → New
          # Name: EMS_DRY_RUN  Value: false
          EMS_DRY_RUN: ${{ vars.EMS_DRY_RUN }}
          # Set via the manual trigger "force_rebalance" input — bypasses the
          # drift gate so every position is sized to its exact target weight.
          # Only takes effect when you manually run the workflow and tick it.
          # Scheduled (daily) runs always leave this as false.
          EMS_FORCE_REBALANCE: ${{ github.event.inputs.force_rebalance || 'false' }}
        run: python ems.py

      # 5. Upload the log file as a downloadable artifact (kept for 7 days).
      - name: Upload log artifact
        if: always()   # upload even if the script failed
        uses: actions/upload-artifact@v4
        with:
          name: ems-log-${{ github.run_id }}
          path: ems.log
          retention-days: 7

  # Deploy the static dashboard to GitHub Pages after every rebalance run.
  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: rebalance
    if: always()   # deploy even if the rebalance step failed or was skipped
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
