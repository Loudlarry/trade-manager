<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Trade Manager — Sign In</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 36px 40px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 16px 48px rgba(0,0,0,.5);
        }
        .logo {
            font-size: 1.5rem;
            margin-bottom: 4px;
        }
        h1 {
            font-size: 1.05rem;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 0.77rem;
            color: #8b949e;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 0.81rem;
            color: #c9d1d9;
            margin-bottom: 5px;
        }
        .input-wrap { position: relative; margin-bottom: 20px; }
        input[type="password"],
        input[type="text"] {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 0.88rem;
            padding: 9px 38px 9px 12px;
            width: 100%;
            outline: none;
            transition: border-color .15s;
        }
        input:focus { border-color: #58a6ff; }
        .btn-eye {
            position: absolute;
            right: 8px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            cursor: pointer; font-size: 0.9rem;
            color: #8b949e; padding: 2px 4px;
        }
        .btn-eye:hover { color: #f0f6fc; }
        .error {
            background: rgba(248,81,73,.1);
            border: 1px solid rgba(248,81,73,.3);
            border-radius: 6px;
            color: #f85149;
            font-size: 0.8rem;
            padding: 9px 13px;
            margin-bottom: 18px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 9px;
            background: #1f6feb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity .15s;
        }
        button[type="submit"]:hover { opacity: .85; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">📊</div>
    <h1>EMS Trade Manager</h1>
    <div class="subtitle">Enter your dashboard password to continue.</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login{% if request.args.next %}?next={{ request.args.next }}{% endif %}">
        <label for="password">Password</label>
        <div class="input-wrap">
            <input type="password" id="password" name="password"
                   autofocus autocomplete="current-password"
                   placeholder="••••••••">
            <button type="button" class="btn-eye"
                    onclick="const i=document.getElementById('password');
                             i.type=i.type==='password'?'text':'password';
                             this.textContent=i.type==='password'?'👁':'🙈'">👁</button>
        </div>
        <button type="submit">Sign In →</button>
    </form>
</div>
</body>
</html>
